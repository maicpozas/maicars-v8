<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MaiCars — Gestión de compra/venta de vehículos</title>
  <meta name="description" content="Registra la compra, gastos y venta de tus vehículos y controla tu margen de ganancia al instante.">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" href="assets/icon-192.png">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <meta name="theme-color" content="#0a0b0d">
  <style>
    :root{
      --bg:#0a0b0d; --bg-soft:#0e1013;
      --surface:#141519; --surface-2:#191b20;
      --border:#23262d; --border-soft:#1b1d23;
      --text:#eef1f4; --text-dim:#9aa3ad; --text-faint:#666d78;
      --accent:#2ee6c5; --accent-strong:#17c9ac; --accent-soft:rgba(46,230,197,.12); --accent-contrast:#04211c;
      --danger:#ff6b6b; --danger-strong:#ef4444; --danger-soft:rgba(255,107,107,.14);
      --success:#57e389;
      --radius-lg:18px; --radius-md:14px; --radius-sm:10px;
      --shadow-1:0 1px 2px rgba(0,0,0,.4);
      --shadow-2:0 12px 32px rgba(0,0,0,.45);
      color-scheme:dark;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0; font-family:"Segoe UI",system-ui,-apple-system,Roboto,sans-serif;
      background:
        radial-gradient(1200px 600px at 100% -10%, rgba(46,230,197,.06), transparent 60%),
        radial-gradient(900px 500px at -10% 0%, rgba(46,230,197,.04), transparent 55%),
        var(--bg);
      color:var(--text); display:grid; grid-template-rows:auto 1fr auto; min-height:100vh;
      -webkit-font-smoothing:antialiased;
    }
    h1,h2,h3,h4{ margin:0; letter-spacing:-.01em }
    p{ margin:0 }

    /* ---------- App bar ---------- */
    .appbar{
      position:sticky; top:0; z-index:60; display:flex; align-items:center; justify-content:space-between;
      padding:12px 18px; background:rgba(10,11,13,.78); backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border-soft);
    }
    .brand{ display:flex; align-items:center; gap:10px; font-weight:800; font-size:1.05rem; cursor:pointer; user-select:none }
    .brand-mark{
      width:34px; height:34px; border-radius:10px; display:grid; place-items:center; flex:none;
      background:linear-gradient(155deg, var(--accent), var(--accent-strong)); color:var(--accent-contrast);
      box-shadow:0 4px 14px rgba(46,230,197,.25);
    }
    .brand span{ color:var(--accent) }
    .app-actions{ display:flex; gap:8px; align-items:center }

    .chip{ display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:999px; font-weight:700; font-size:.78rem; color:var(--accent); background:var(--accent-soft); border:1px solid transparent; white-space:nowrap }
    .chip::before{ content:""; width:7px; height:7px; border-radius:50%; background:var(--accent) }
    .chip.chip-offline{ color:var(--danger); background:var(--danger-soft) }
    .chip.chip-offline::before{ background:var(--danger) }

    .btn-sm{ padding:7px 12px !important; font-size:.82rem !important; border-radius:9px !important }

    .menu-btn{ appearance:none; border:1px solid var(--border); background:var(--surface); color:var(--text); font-weight:700; cursor:pointer; padding:9px 14px; border-radius:10px; display:flex; align-items:center; gap:6px }
    .menu-btn:hover{ border-color:var(--accent) }
    .dropdown{ position:relative }
    .dropdown-panel{ position:absolute; right:0; top:calc(100% + 8px); min-width:210px; background:var(--surface-2); border:1px solid var(--border); border-radius:var(--radius-md); box-shadow:var(--shadow-2); display:none; padding:6px; opacity:0; transform:translateY(-4px); transition:opacity .12s ease, transform .12s ease }
    .dropdown.open .dropdown-panel{ display:block; opacity:1; transform:translateY(0) }
    .dropdown-panel button{ width:100%; text-align:left; appearance:none; border:none; background:transparent; color:var(--text); padding:10px 12px; border-radius:8px; cursor:pointer; font-size:.92rem; display:flex; align-items:center; gap:10px }
    .dropdown-panel button:hover{ background:var(--surface) }
    .dropdown-panel button svg{ color:var(--accent) }

    main{ padding:18px; max-width:1080px; margin:0 auto; width:100% }

    /* ---------- Layout helpers ---------- */
    .grid{ display:grid; gap:14px }
    .grid.autos{ grid-template-columns:repeat(auto-fill, minmax(210px,1fr)) }
    .stack{ display:grid; gap:14px }
    .row{ display:flex; gap:10px; align-items:center; flex-wrap:wrap }
    .hide{ display:none !important }
    .muted{ color:var(--text-dim) }
    .faint{ color:var(--text-faint); font-size:.82rem }

    .toolbar{ display:flex; gap:10px; align-items:center; justify-content:space-between; margin-bottom:16px; flex-wrap:wrap }
    .search-box{ position:relative; flex:1; min-width:200px; max-width:360px }
    .search-box svg{ position:absolute; left:12px; top:50%; transform:translateY(-50%); color:var(--text-faint); pointer-events:none }
    .search-box input{ padding-left:36px }
    .toolbar-count{ font-size:.85rem; color:var(--text-dim); white-space:nowrap }

    /* ---------- Stat tiles ---------- */
    .stats-row{ display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:18px }
    .stat-tile{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-md); padding:14px 16px; display:grid; gap:6px }
    .stat-label{ font-size:.78rem; color:var(--text-dim); font-weight:600; text-transform:uppercase; letter-spacing:.04em }
    .stat-value{ font-size:1.3rem; font-weight:800 }
    .stat-value.positive{ color:var(--success) }
    .stat-value.negative{ color:var(--danger) }

    /* ---------- Cards ---------- */
    .card{ background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px; box-shadow:var(--shadow-1) }
    .auto-card{ text-align:center; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:18px; transition:border-color .15s ease, transform .15s ease; position:relative }
    .auto-card:hover{ border-color:#2c3038; transform:translateY(-2px) }
    .thumb{ width:140px; height:140px; border-radius:50%; object-fit:cover; border:2px solid var(--accent); background:var(--bg-soft); display:block; margin:4px auto 12px }
    .thumb-sold{ filter:grayscale(100%) brightness(.8) }
    .title{ font-weight:800; font-size:1.02rem; margin:2px 0 2px }
    .price-tag{ display:inline-block; font-weight:700; color:var(--accent); background:var(--accent-soft); padding:4px 10px; border-radius:999px; font-size:.82rem; margin-top:6px }
    .pill{ display:inline-flex; align-items:center; gap:6px; padding:6px 12px; border-radius:999px; font-size:.82rem; border:1px solid var(--border); background:var(--bg-soft); color:var(--text-dim) }

    /* ---------- Buttons ---------- */
    .btn{ appearance:none; border:1px solid transparent; outline:none; cursor:pointer; background:var(--accent); color:var(--accent-contrast); font-weight:700; padding:11px 16px; border-radius:11px; font-size:.92rem; transition:filter .12s ease, transform .06s ease, background .15s ease; min-height:42px }
    .btn:hover{ filter:brightness(1.06) }
    .btn:active{ transform:scale(.98) }
    .btn:disabled{ opacity:.5; cursor:not-allowed; filter:none }
    .btn-outline{ background:transparent; color:var(--accent); border:1px solid var(--border) }
    .btn-outline:hover{ border-color:var(--accent); background:var(--accent-soft) }
    .btn-danger{ background:var(--danger); color:#2a0000 }
    .btn-danger:hover{ background:var(--danger-strong); color:white }
    .btn-danger-outline{ background:transparent; color:var(--danger); border:1px solid var(--border) }
    .btn-danger-outline:hover{ border-color:var(--danger); background:var(--danger-soft) }
    .btn-block{ width:100% }
    .icon-btn{ appearance:none; border:1px solid var(--border); background:var(--bg-soft); color:var(--text-dim); cursor:pointer; width:34px; height:34px; border-radius:9px; display:inline-flex; align-items:center; justify-content:center; transition:border-color .12s ease, color .12s ease }
    .icon-btn:hover{ color:var(--accent); border-color:var(--accent) }
    .icon-btn.danger:hover{ color:var(--danger); border-color:var(--danger) }

    /* ---------- Forms ---------- */
    .field label{ display:block; font-size:.85rem; font-weight:600; color:var(--text-dim); margin-bottom:6px }
    input, select{ width:100%; padding:11px 12px; border-radius:10px; border:1px solid var(--border); background:var(--bg-soft); color:var(--text); font-size:.95rem; transition:border-color .12s ease, box-shadow .12s ease }
    input:focus, select:focus{ outline:none; border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft) }
    input::placeholder{ color:var(--text-faint) }
    input[type="file"]{ padding:8px }
    .form-row{ display:grid; gap:14px; grid-template-columns:1fr 1fr }
    @media (max-width:560px){ .form-row{ grid-template-columns:1fr } }
    .input-error{ border-color:var(--danger) !important; animation:shake .32s ease }
    @keyframes shake{ 10%,90%{transform:translateX(-2px)} 20%,80%{transform:translateX(4px)} 30%,50%,70%{transform:translateX(-6px)} 40%,60%{transform:translateX(6px)} }
    .img-preview{ width:100%; max-height:180px; object-fit:cover; border-radius:var(--radius-sm); border:1px solid var(--border); background:var(--bg-soft); margin-top:10px }

    /* ---------- Table ---------- */
    .table{ width:100%; border-collapse:collapse }
    .table th,.table td{ border-bottom:1px solid var(--border-soft); padding:10px 8px; text-align:left; font-size:.9rem }
    .table th{ color:var(--text-dim); font-weight:700; font-size:.78rem; text-transform:uppercase; letter-spacing:.03em }
    .table td.right, .table th.right{ text-align:right }
    .table tbody tr:hover{ background:var(--bg-soft) }
    .table .row-actions{ display:flex; gap:6px; justify-content:flex-end }

    footer{ padding:16px 18px; border-top:1px solid var(--border-soft); text-align:center }

    /* ---------- Detail view ---------- */
    .detail-hero{ width:100%; height:220px; object-fit:cover; border-radius:var(--radius-md); border:1px solid var(--border); background:var(--bg-soft) }
    .detail-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px }
    .detail-item{ background:var(--bg-soft); border:1px solid var(--border-soft); border-radius:var(--radius-sm); padding:12px }
    .detail-label{ color:var(--text-dim); font-size:.78rem; font-weight:600; text-transform:uppercase; letter-spacing:.03em }
    .detail-value{ font-weight:800; font-size:1.05rem; margin-top:2px }
    .detail-value.positive{ color:var(--success) }
    .detail-value.negative{ color:var(--danger) }
    .sold-detail{ margin-top:12px }

    /* ---------- Empty / error / skeleton ---------- */
    .empty-state{ text-align:center; padding:48px 20px; color:var(--text-dim) }
    .empty-state svg{ color:var(--text-faint); margin-bottom:10px }
    .empty-state h3{ color:var(--text); margin-bottom:6px }
    .skel-block{ background:linear-gradient(90deg,#181a1f 25%,#20232a 37%,#181a1f 63%); background-size:400% 100%; animation:skeleton 1.4s ease infinite; border-radius:8px }
    @keyframes skeleton{ 0%{background-position:100% 50%} 100%{background-position:0 50%} }

    /* ---------- Modal ---------- */
    .modal-overlay{ position:fixed; inset:0; background:rgba(4,5,6,.6); backdrop-filter:blur(2px); display:flex; align-items:flex-end; justify-content:center; z-index:200; opacity:0; transition:opacity .15s ease }
    .modal-overlay.show{ opacity:1 }
    @media (min-width:560px){ .modal-overlay{ align-items:center } }
    .modal{ background:var(--surface-2); border:1px solid var(--border); border-radius:18px 18px 0 0; width:100%; max-width:460px; max-height:88vh; overflow:auto; box-shadow:var(--shadow-2); transform:translateY(16px); transition:transform .15s ease }
    .modal-overlay.show .modal{ transform:translateY(0) }
    @media (min-width:560px){ .modal{ border-radius:18px } }
    .modal-header{ display:flex; align-items:center; justify-content:space-between; padding:18px 20px 8px }
    .modal-body{ padding:6px 20px 4px; display:grid; gap:14px }
    .modal-footer{ display:flex; justify-content:flex-end; gap:10px; padding:18px 20px }
    .modal-close{ appearance:none; border:none; background:var(--bg-soft); color:var(--text-dim); width:30px; height:30px; border-radius:8px; cursor:pointer; display:grid; place-items:center }
    .modal-close:hover{ color:var(--text) }
    .modal-overlay.modal-danger .modal-header h3{ color:var(--danger) }
    .preview-box{ background:var(--bg-soft); border:1px solid var(--border-soft); border-radius:var(--radius-sm); padding:14px; display:flex; justify-content:space-between; align-items:center }
    .preview-box strong{ font-size:1.15rem; color:var(--success) }
    .preview-box.preview-neg strong{ color:var(--danger) }

    /* ---------- Toasts ---------- */
    .toast-container{ position:fixed; left:0; right:0; bottom:18px; display:flex; flex-direction:column; align-items:center; gap:8px; z-index:300; pointer-events:none; padding:0 16px }
    .toast{ pointer-events:auto; background:var(--surface-2); border:1px solid var(--border); border-left:3px solid var(--accent); color:var(--text); padding:12px 16px; border-radius:10px; box-shadow:var(--shadow-2); font-size:.9rem; max-width:420px; width:100%; opacity:0; transform:translateY(8px); transition:opacity .18s ease, transform .18s ease }
    .toast.show{ opacity:1; transform:translateY(0) }
    .toast.toast-error{ border-left-color:var(--danger) }
    .toast.toast-ok{ border-left-color:var(--success) }
  </style>
</head>
<body>
  <header class="appbar">
    <div class="brand" id="brandHome">
      <span class="brand-mark">
        <svg viewBox="0 0 24 24" width="19" height="19" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 17h14M5 17a2 2 0 1 1-4 0 2 2 0 0 1 4 0Zm14 0a2 2 0 1 0 4 0 2 2 0 0 0-4 0ZM3 17V11l2-5h14l2 5v6"/><path d="M5 11h14"/></svg>
      </span>
      Mai<span>Cars</span>
    </div>
    <div class="app-actions">
      <span class="chip" id="statusChip">En línea</span>
      <button class="btn btn-outline btn-sm hide" id="installBtn">Instalar app</button>
      <div class="dropdown" id="menu">
        <button class="menu-btn" id="menuBtn">Menú ▾</button>
        <div class="dropdown-panel" aria-label="Menú">
          <button id="m_inventario">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
            Inventario
          </button>
          <button id="m_vendidos">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-4 4"/></svg>
            Vendidos
          </button>
          <button id="m_agregar">
            <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"/></svg>
            Agregar vehículo
          </button>
        </div>
      </div>
    </div>
  </header>

  <main>
    <!-- Agregar vehículo -->
    <section id="view-form" class="card hide" aria-label="Agregar vehículo" style="max-width:640px;margin:0 auto">
      <h2 style="margin-bottom:16px">Nuevo vehículo</h2>
      <div class="stack">
        <div class="form-row">
          <div class="field"><label>Marca *</label><input id="f_marca" type="text" placeholder="Ej: Toyota"></div>
          <div class="field"><label>Modelo *</label><input id="f_modelo" type="text" placeholder="Ej: Corolla"></div>
        </div>
        <div class="form-row">
          <div class="field"><label>Año *</label><input id="f_anio" type="number" min="1950" max="2099" placeholder="Ej: 2017"></div>
          <div class="field"><label>Costo de compra (CLP) *</label><input id="f_compra" type="number" min="0" step="1" placeholder="Ej: 8000000"></div>
        </div>
        <div class="form-row">
          <div class="field"><label>URL de imagen (opcional)</label><input id="f_img" type="url" placeholder="https://..."></div>
          <div class="field"><label>Subir foto desde el teléfono</label><input id="f_img_file" type="file" accept="image/*"></div>
        </div>
        <img id="f_preview" class="img-preview hide" alt="Vista previa">
        <div class="row" style="justify-content:flex-end">
          <button class="btn btn-outline" id="f_cancelar">Cancelar</button>
          <button class="btn" id="f_guardar">Guardar vehículo</button>
        </div>
        <p class="faint">La imagen se comprime automáticamente antes de guardarse en la nube.</p>
      </div>
    </section>

    <!-- Inventario -->
    <section id="view-inventario" aria-label="Inventario">
      <div class="toolbar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="inv-search" type="text" placeholder="Buscar por marca, modelo o año...">
        </div>
        <span class="toolbar-count" id="inv-count"></span>
      </div>
      <div class="grid autos" id="inventario-grid"></div>
    </section>

    <!-- Detalle inventario -->
    <section id="view-detalle" class="hide" aria-label="Detalle inventario"></section>

    <!-- Vendidos -->
    <section id="view-vendidos" class="hide" aria-label="Vendidos">
      <div class="stats-row" id="ven-stats"></div>
      <div class="toolbar">
        <div class="search-box">
          <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
          <input id="ven-search" type="text" placeholder="Buscar por marca, modelo o año...">
        </div>
        <div class="row" style="gap:8px">
          <span class="toolbar-count" id="ven-count"></span>
          <button class="btn btn-outline btn-sm" id="ven-export">
            <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="vertical-align:-2px;margin-right:4px"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            Exportar CSV
          </button>
        </div>
      </div>
      <div class="grid autos" id="vendidos-grid"></div>
    </section>
  </main>

  <footer>
    <small class="muted">MaiCars • PWA instalable · Datos en la nube (Netlify DB)</small>
  </footer>

  <!-- Modal -->
  <div class="modal-overlay hide" id="modalOverlay">
    <div class="modal">
      <div class="modal-header">
        <h3 id="modalTitle"></h3>
        <button class="modal-close" id="modalCloseBtn" aria-label="Cerrar">✕</button>
      </div>
      <div class="modal-body" id="modalBody"></div>
      <div class="modal-footer" id="modalFooter"></div>
    </div>
  </div>

  <!-- Toasts -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    /* ===================== Utilidades base ===================== */
    const CLP = new Intl.NumberFormat('es-CL', { style:'currency', currency:'CLP', maximumFractionDigits:0 });
    const fmt = (n) => CLP.format(Number(n || 0));
    const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);
    const $ = (sel, root=document) => root.querySelector(sel);
    const todayISODate = () => new Date().toISOString().slice(0,10);
    const fechaCL = (iso) => iso ? new Date(iso).toLocaleDateString('es-CL') : '';

    async function api(path, opts){
      let res;
      try{ res = await fetch(path, opts); }
      catch(e){ throw new Error('No se pudo conectar con el servidor.'); }
      if(!res.ok){
        let text = await res.text().catch(()=> '');
        if(!text || /<\/?[a-z][\s\S]*>/i.test(text)) text = 'Error ' + res.status;
        throw new Error(text.slice(0, 200));
      }
      const ct = res.headers.get('content-type') || '';
      return ct.includes('application/json') ? res.json() : null;
    }

    function csvEscape(v){
      const s = String(v ?? '');
      return /[",\r\n]/.test(s) ? '"' + s.replace(/"/g,'""') + '"' : s;
    }

    function shake(el){ if(!el) return; el.classList.remove('input-error'); void el.offsetWidth; el.classList.add('input-error'); el.focus(); }

    /* ===================== Toasts ===================== */
    function toast(message, type='ok'){
      const container = $('#toastContainer');
      const el = document.createElement('div');
      el.className = 'toast toast-' + type;
      el.textContent = message;
      container.appendChild(el);
      requestAnimationFrame(()=> el.classList.add('show'));
      setTimeout(()=>{ el.classList.remove('show'); setTimeout(()=> el.remove(), 200); }, 3600);
    }

    /* ===================== Modal engine ===================== */
    const modalOverlay = $('#modalOverlay');
    let activeOnClose = null;
    let modalKeyHandler = null;

    function showModal({ title, bodyHTML, buttons, onMount, danger }){
      $('#modalTitle').textContent = title;
      $('#modalBody').innerHTML = bodyHTML;
      const footer = $('#modalFooter'); footer.innerHTML = '';
      modalOverlay.classList.toggle('modal-danger', !!danger);

      (buttons || []).forEach(b => {
        const btn = document.createElement('button');
        btn.className = b.className || 'btn btn-outline';
        btn.textContent = b.label;
        btn.addEventListener('click', () => {
          const result = b.onClick ? b.onClick($('#modalBody')) : undefined;
          if(result === false) return;
          closeModal();
        });
        footer.appendChild(btn);
      });

      modalOverlay.classList.remove('hide');
      requestAnimationFrame(()=> modalOverlay.classList.add('show'));
      if(onMount) onMount($('#modalBody'));
      const firstInput = $('#modalBody').querySelector('input,select,textarea');
      if(firstInput) firstInput.focus();

      modalKeyHandler = (e) => { if(e.key === 'Escape') closeModal(); };
      document.addEventListener('keydown', modalKeyHandler);
    }
    function closeModal(){
      modalOverlay.classList.remove('show');
      if(modalKeyHandler){ document.removeEventListener('keydown', modalKeyHandler); modalKeyHandler = null; }
      setTimeout(()=> modalOverlay.classList.add('hide'), 150);

    /* ===================== Imagen (compresión) ===================== */
    let selectedImageDataURL = null;
    function resizeImageFile(file, maxW=960, quality=0.82){
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => {
          const img = new Image();
          img.onload = () => {
            const scale = Math.min(1, maxW / img.width);
            const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
            const canvas = document.createElement('canvas'); canvas.width = w; canvas.height = h;
            canvas.getContext('2d').drawImage(img, 0, 0, w, h);
            resolve(canvas.toDataURL('image/jpeg', quality));
          };
          img.onerror = reject;
          img.src = reader.result;
        };
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }
    function currentImageSrc(){ return selectedImageDataURL || ($('#f_img').value || '').trim() || null; }
    function updateFormPreview(){

      try{ selectedImageDataURL = await resizeImageFile(file); }
      catch(e){ selectedImageDataURL = null; toast('No se pudo procesar la imagen', 'error'); }
      updateFormPreview();

    }
    function errorState(message, retryFn){

      box.innerHTML = `<p class="muted" style="margin-bottom:12px">${message}</p><button class="btn btn-outline" id="retryBtn">Reintentar</button>`;

      const el = $('#ven-stats');
      if(vendidos.length === 0){ el.innerHTML = ''; return; }
      const n = vendidos.length;
      const totalGanancia = vendidos.reduce((a,v) => a + Number(v.ganancia||0), 0);
      const margenProm = vendidos.reduce((a,v) => a + (v.venta ? Number(v.ganancia)/Number(v.venta) : 0), 0) / n * 100;
      el.innerHTML = `
        <div class="stat-tile"><span class="stat-label">Vendidos</span><span class="stat-value">${n}</span></div>
        <div class="stat-tile"><span class="stat-label">Ganancia total</span><span class="stat-value ${totalGanancia>=0?'positive':'negative'}">${fmt(totalGanancia)}</span></div>
        <div class="stat-tile"><span class="stat-label">Ganancia promedio</span><span class="stat-value">${fmt(totalGanancia/n)}</span></div>
        <div class="stat-tile"><span class="stat-label">Margen promedio</span><span class="stat-value">${margenProm.toFixed(1)}%</span></div>
      `;
    }
    function renderVendidos(){
      const q = ($('#ven-search').value || '').toLowerCase().trim();
      const vendidos = vendidosCache.vendidos;
      const list = !q ? vendidos : vendidos.filter(v => `${v.marca} ${v.modelo} ${v.anio}`.toLowerCase().includes(q));
      $('#ven-count').textContent = vendidos.length ? `${list.length} de ${vendidos.length}` : '';
      const cont = $('#vendidos-grid'); cont.innerHTML = '';
      if(vendidos.length === 0){
        cont.innerHTML = emptyState(ICON_SOLD, 'Aún no registras ventas', 'Cuando vendas un vehículo del inventario, aparecerá aquí con su desglose completo.');
        return;
      }
      if(list.length === 0){
        cont.innerHTML = emptyState(ICON_SOLD, 'Sin resultados', 'No hay ventas que coincidan con tu búsqueda.');
        return;
      }
      list.forEach(v => {
        const gastosDetalle = vendidosCache.detalle[v.id] || [];
        const card = document.createElement('article'); card.className = 'auto-card';
        card.innerHTML = `
          <img class="thumb thumb-sold" src="${v.img || PLACEHOLDER_IMG}" alt="${v.marca} ${v.modelo}">
          <div class="title">${v.marca} ${v.modelo}</div>
          <div class="muted">Año ${v.anio}</div>
          <div class="price-tag" style="color:var(--success);background:rgba(87,227,137,.12)">Ganancia ${fmt(v.ganancia)}</div>
          <div class="row" style="justify-content:center; margin-top:14px">
            <button class="btn btn-outline btn-sm" data-action="toggle" data-id="${v.id}">Ver venta</button>
            <button class="icon-btn danger" data-action="eliminar-vendido" data-id="${v.id}" aria-label="Eliminar registro">
              <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
            </button>
          </div>
          <div class="sold-detail hide" id="detail-${v.id}">
            <div class="detail-grid">
              <div class="detail-item"><div class="detail-label">Compra</div><div class="detail-value">${fmt(v.compra)}</div></div>
              <div class="detail-item"><div class="detail-label">Gastos</div><div class="detail-value">${fmt(v.gastos_total)}</div></div>
              <div class="detail-item"><div class="detail-label">Venta</div><div class="detail-value">${fmt(v.venta)}</div></div>
              <div class="detail-item"><div class="detail-label">Ganancia</div><div class="detail-value ${v.ganancia>=0?'positive':'negative'}">${fmt(v.ganancia)}</div></div>
              <div class="detail-item"><div class="detail-label">Fecha de venta</div><div class="detail-value">${fechaCL(v.fecha_venta)}</div></div>
            </div>
            <div class="card" style="margin-top:12px; text-align:left">
              <h4 style="margin-bottom:8px">Detalle de gastos</h4>
              ${gastosDetalle.length > 0 ? `
                <table class="table">
                  <thead><tr><th>Nombre</th><th class="right">Monto</th><th class="right">Fecha</th></tr></thead>
                  <tbody>
                    ${gastosDetalle.map(g => `<tr><td>${g.nombre}</td><td class="right">${fmt(g.monto)}</td><td class="right">${fechaCL(g.fecha)}</td></tr>`).join('')}
                  </tbody>
                </table>` : '<p class="muted">Sin gastos registrados.</p>'}
            </div>
          </div>`;
        cont.appendChild(card);
      });
      cont.querySelectorAll('[data-action="toggle"]').forEach(btn => {
        btn.addEventListener('click', () => {
          const panel = document.getElementById('detail-' + btn.dataset.id);
          panel.classList.toggle('hide');
          btn.textContent = panel.classList.contains('hide') ? 'Ver venta' : 'Ocultar';
        });
      });
      cont.querySelectorAll('[data-action="eliminar-vendido"]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const ok = await confirmDialog('Eliminar registro', '¿Eliminar este registro de venta? Esta acción no se puede deshacer.', { danger:true, confirmLabel:'Eliminar' });
          if(!ok) return;
          try{ await api('/api/vendidos-delete', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id: btn.dataset.id }) }); toast('Registro eliminado'); loadVendidos(); }
          catch(e){ toast('No se pudo eliminar: ' + e.message, 'error'); }
        });
      });
    }
    $('#ven-search').addEventListener('input', renderVendidos);

    $('#ven-export').addEventListener('click', () => {
      const vendidos = vendidosCache.vendidos;
      if(vendidos.length === 0){ toast('No hay ventas para exportar', 'error'); return; }
      const header = ['Marca','Modelo','Año','Compra','Gastos','Venta','Ganancia','Fecha de venta'];
      const rows = vendidos.map(v => [v.marca, v.modelo, v.anio, v.compra, v.gastos_total, v.venta, v.ganancia, fechaCL(v.fecha_venta)]);
      const csv = [header, ...rows].map(r => r.map(csvEscape).join(',')).join('\r\n');
      const blob = new Blob(['﻿' + csv], { type:'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url; a.download = 'maicars-ventas-' + todayISODate() + '.csv';
      document.body.appendChild(a); a.click(); a.remove();
      URL.revokeObjectURL(url);
    });

    /* ===================== Alta de vehículo ===================== */
    async function altaVehiculo(){
      const marca = $('#f_marca').value.trim();
      const modelo = $('#f_modelo').value.trim();
      const anio = Number($('#f_anio').value);
      const compra = Number($('#f_compra').value || 0);
      if(!marca){ shake($('#f_marca')); return; }
      if(!modelo){ shake($('#f_modelo')); return; }
      if(!anio){ shake($('#f_anio')); return; }
      if(!compra || compra <= 0){ shake($('#f_compra')); return; }
      const img = currentImageSrc();
      const id = uid();
      const btn = $('#f_guardar'); btn.disabled = true;
      try{
        await api('/api/inventario-add', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ id, marca, modelo, anio, compra, img }) });
        toast('Vehículo agregado al inventario');
        resetForm(); show('inventario'); loadInventario();
      } catch(e){ toast('No se pudo guardar: ' + e.message, 'error'); }
      finally{ btn.disabled = false; }
    }
    function resetForm(){
      $('#f_marca').value = ''; $('#f_modelo').value = ''; $('#f_anio').value = ''; $('#f_compra').value = '';
      $('#f_img').value = ''; $('#f_img_file').value = ''; selectedImageDataURL = null;
      $('#f_preview').classList.add('hide');
    }
    $('#f_cancelar').addEventListener('click', () => { resetForm(); show('inventario'); });
    $('#f_guardar').addEventListener('click', altaVehiculo);

    /* ===================== Migración de datos locales (versión anterior) ===================== */
    async function checkLegacyMigration(){
      let legacyInv = [], legacyVen = [];
      try{ legacyInv = JSON.parse(localStorage.getItem('inventario_autos_v4') || '[]'); }catch(e){ legacyInv = []; }
      try{ legacyVen = JSON.parse(localStorage.getItem('autos_vendidos_v4') || '[]'); }catch(e){ legacyVen = []; }
      if((!legacyInv || legacyInv.length === 0) && (!legacyVen || legacyVen.length === 0)) return;

      const ok = await confirmDialog(
        'Datos encontrados en este dispositivo',
        `Encontramos ${legacyInv.length} vehículo(s) en inventario y ${legacyVen.length} venta(s) guardados localmente en este dispositivo (de la versión anterior de la app). ¿Quieres importarlos ahora a la nube?`,
        { confirmLabel:'Importar' }
      );
      if(!ok) return;

      try{
        let importadosInv = 0, importadosVen = 0;
        if(legacyInv.length){
          const payload = legacyInv.map(a => ({
            marca: a.marca, modelo: a.modelo, anio: a.anio, compra: a.compra, img: a.img || null,
            gastos: (a.gastos || a.gastosDetalle || []).map(g => ({ nombre: g.nombre, monto: g.monto, fecha: g.fecha }))
          }));
          const r = await api('/api/inventario-import', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ vehiculos: payload }) });
          importadosInv = r.importados || 0;
        }
        if(legacyVen.length){
          const payload = legacyVen.map(v => ({
            marca: v.marca, modelo: v.modelo, anio: v.anio, compra: v.compra, venta: v.venta,
            gastosTotal: v.gastosTotal, fechaVenta: v.fechaVenta, img: v.img || null,
            gastosDetalle: (v.gastosDetalle || []).map(g => ({ nombre: g.nombre, monto: g.monto, fecha: g.fecha }))
          }));
          const r = await api('/api/vendidos-import', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ vendidos: payload }) });
          importadosVen = r.importados || 0;
        }
        // Se conservan con otro nombre por seguridad, en vez de borrarlos, hasta confirmar que todo llegó bien.
        if(legacyInv.length) localStorage.setItem('inventario_autos_v4_migrado', JSON.stringify(legacyInv));
        if(legacyVen.length) localStorage.setItem('autos_vendidos_v4_migrado', JSON.stringify(legacyVen));
        localStorage.removeItem('inventario_autos_v4');
        localStorage.removeItem('autos_vendidos_v4');
        toast(`Importados ${importadosInv} vehículo(s) y ${importadosVen} venta(s) desde este dispositivo`);
        loadInventario();
      } catch(e){
        toast('No se pudo completar la importación: ' + e.message, 'error');
      }
    }

    /* ===================== Inicio ===================== */
    loadInventario();
    show('inventario');
    checkLegacyMigration();
    if('serviceWorker' in navigator){
      window.addEventListener('load', () => { navigator.serviceWorker.register('sw.js').catch(console.warn); });
    }
  </script>
</body>
</html>
